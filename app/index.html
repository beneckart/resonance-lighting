<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- camp tool, shared by direct link only — keep out of search indexes -->
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='13'%3E%F0%9F%8C%B3%3C/text%3E%3C/svg%3E" />
    <title>Resonance Tree — Mirror Twin</title>
    <style>
      html, body, #root { margin: 0; height: 100%; background: #07090c; }
      * { box-sizing: border-box; }
      /* SLIDERS — Safari renders range inputs as a bare white thumb on an
         invisible track (accentColor styles no track there). Explicit WebKit/
         Gecko parts: BLUE thumb + visible track, everywhere (Elliot). */
      input[type="range"] { -webkit-appearance: none; appearance: none; height: 20px; background: transparent; }
      input[type="range"]::-webkit-slider-runnable-track {
        height: 6px; border-radius: 3px;
        background: linear-gradient(90deg, #5b8cff 0%, #2a3a52 0%); /* JS sets --fill */
        background: #24344e; border: 1px solid #35496b;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none; width: 16px; height: 16px; margin-top: -6px;
        border-radius: 50%; background: #5b8cff; border: 2px solid #dce6ff;
        box-shadow: 0 0 6px rgba(91, 140, 255, 0.7);
      }
      input[type="range"]::-moz-range-track { height: 6px; border-radius: 3px; background: #24344e; border: 1px solid #35496b; }
      input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #5b8cff; border: 2px solid #dce6ff; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
